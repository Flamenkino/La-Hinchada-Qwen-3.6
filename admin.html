<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Hinchada | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <style>
    body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; }
    .btn-green { background-color: #39ff14; color: black; }
    .btn-red { background-color: #ef4444; color: white; }
    input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 0.5rem; border-radius: 0.5rem; width: 100%; margin-bottom: 0.5rem; }
  </style>
</head>
<body class="p-6">

  <!-- LOGIN -->
  <div id="login" class="max-w-md mx-auto mt-20 p-8 bg-neutral-900 rounded-xl border border-gray-800 text-center">
    <h2 class="text-2xl font-bold text-[#39ff14] mb-4">🔐 Acceso Admin</h2>
    <input type="email" id="email" placeholder="Tu email de admin">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()" class="btn btn-green w-full">Entrar</button>
  </div>

  <!-- PANEL -->
  <div id="panel" class="hidden max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-[#39ff14]">⚙️ Gestión de Equipos</h1>
      <button onclick="logout()" class="text-sm text-gray-400 underline">Cerrar sesión</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- AÑADIR -->
      <div class="bg-neutral-900 p-6 rounded-xl border border-gray-800">
        <h3 class="text-xl font-bold mb-4">➕ Añadir Equipo</h3>
        <label class="text-sm text-gray-400">Liga</label>
        <select id="sel-league"></select>
        <label class="text-sm text-gray-400">Nombre Equipo</label>
        <input type="text" id="inp-name" placeholder="Ej: Real Madrid">
        <label class="text-sm text-gray-400">Emoji / Badge</label>
        <input type="text" id="inp-badge" placeholder="Ej: ⚪">
        <button onclick="addTeam()" class="btn btn-green w-full mt-2">Guardar Equipo</button>
        <hr class="border-gray-800 my-4">
        <label class="text-sm text-gray-400">Añadir Nueva Liga</label>
        <div class="flex gap-2">
          <input type="text" id="inp-new-league" placeholder="Clave (ej: laliga)" class="mb-0">
          <button onclick="addLeague()" class="btn btn-green">Crear</button>
        </div>
      </div>

      <!-- LISTA -->
      <div class="bg-neutral-900 p-6 rounded-xl border border-gray-800">
        <h3 class="text-xl font-bold mb-4">📋 Borrar Equipos</h3>
        <div id="list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
      </div>
    </div>
  </div>

<script>
  // 🔥 TU CONFIGURACIÓN DE FIREBASE (INTEGRADA)
  const firebaseConfig = {
    apiKey: "AIzaSyDPQHc1TPeyZLbmfLQDzin68r9vvM8jX8k",
    authDomain: "la-hinchada-cf1a2.firebaseapp.com",
    databaseURL: "https://la-hinchada-cf1a2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "la-hinchada-cf1a2",
    storageBucket: "la-hinchada-cf1a2.firebasestorage.app",
    messagingSenderId: "636082219451",
    appId: "1:636082219451:web:3aa5ee1a7c18d4b7177c9e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('panel').classList.remove('hidden');
      loadLeagues();
      loadTeams();
    }
  });

  function login() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
  }
  function logout() { auth.signOut(); }

  function loadLeagues() {
    const sel = document.getElementById('sel-league');
    sel.innerHTML = '';
    db.ref('teams').on('value', snap => {
      const data = snap.val() || {};
      Object.keys(data).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = data[key].name;
        sel.appendChild(opt);
      });
    });
  }

  function loadTeams() {
    const list = document.getElementById('list');
    db.ref('teams').on('value', snap => {
      list.innerHTML = '';
      const data = snap.val() || {};
      Object.entries(data).forEach(([leagueKey, league]) => {
        league.teams.forEach((team, idx) => {
          const teamsArr = league.teams;
          const internalKey = Object.keys(teamsArr)[idx]; 
          list.innerHTML += `
            <div class="flex justify-between items-center bg-dark p-2 rounded border border-gray-700">
              <span>${team.badge || '⚽'} ${team.name} <small class="text-gray-500">(${league.name})</small></span>
              <button onclick="deleteTeam('${leagueKey}', '${internalKey}')" class="btn btn-red text-xs px-2 py-1">🗑️</button>
            </div>`;
        });
      });
    });
  }

  function addTeam() {
    const leagueKey = document.getElementById('sel-league').value;
    const name = document.getElementById('inp-name').value;
    const badge = document.getElementById('inp-badge').value;
    if (!name || !leagueKey) return alert("Completa los campos");
    db.ref(`teams/${leagueKey}/teams`).push({
      id: name.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 4),
      name: name,
      badge: badge || '⚽'
    }).then(() => {
      alert("Añadido!");
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-badge').value = '';
    });
  }

  function addLeague() {
    const key = document.getElementById('inp-new-league').value;
    const name = prompt("Nombre de la liga (Ej: Primera División):");
    if(key && name) {
      db.ref(`teams/${key}`).set({ name: name, teams: [] });
      document.getElementById('inp-new-league').value = '';
    }
  }

  function deleteTeam(leagueKey, internalKey) {
    if(!confirm("¿Seguro que quieres borrarlo?")) return;
    db.ref(`teams/${leagueKey}/teams/${internalKey}`).remove();
  }
</script>
</body>
</html>
